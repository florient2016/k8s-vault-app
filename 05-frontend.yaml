# =============================================================================
# 05-frontend.yaml
# React/Nginx frontend
# Serves the SPA and proxies /api/ requests to the backend
# No credentials needed — this tier has no database access
# =============================================================================

---
# -----------------------------------------------------------------------------
# ConfigMap — Nginx configuration
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: itssolutions-prod
  labels:
    app: frontend
data:
  nginx.conf: |
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      # Logging
      log_format main '$remote_addr -  $ remote_user [ $ time_local] '
                      '"$request" $status  $ body_bytes_sent '
                      '" $ http_referer" "$http_user_agent"';
      access_log /var/log/nginx/access.log main;

      sendfile        on;
      tcp_nopush      on;
      tcp_nodelay     on;
      keepalive_timeout 65;
      gzip            on;
      gzip_types      text/plain text/css application/json
                      application/javascript text/xml application/xml
                      application/xml+rss text/javascript;

      # Security headers
      add_header X-Frame-Options           "SAMEORIGIN"        always;
      add_header X-Content-Type-Options    "nosniff"           always;
      add_header X-XSS-Protection          "1; mode=block"     always;
      add_header Referrer-Policy           "strict-origin"     always;
      add_header Permissions-Policy        "geolocation=()"    always;
      add_header Strict-Transport-Security "max-age=31536000"  always;

      server {
        listen       8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # Proxy /api/ to backend service
        location /api/ {
          proxy_pass         http://backend.itssolutions-prod.svc.cluster.local:3000;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_connect_timeout 10s;
          proxy_read_timeout    60s;
        }

        # Health check for backend via nginx
        location /health {
          proxy_pass http://backend.itssolutions-prod.svc.cluster.local:3000/health;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
        }

        # SPA fallback — all routes served by index.html
        location / {
          try_files $uri $uri/ /index.html;
        }

        # Deny dot files
        location ~ /\. {
          deny all;
        }
      }
    }

---
# -----------------------------------------------------------------------------
# ConfigMap — Frontend SPA (single index.html)
# Full React-style login app with JWT authentication
# Communicates with backend via /api/ (proxied by nginx)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: itssolutions-prod
  labels:
    app: frontend
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <title>ITS Solutions — Login</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --primary:      #2563eb;
          --primary-dark: #1d4ed8;
          --danger:       #dc2626;
          --success:      #16a34a;
          --bg:           #f1f5f9;
          --surface:      #ffffff;
          --text:         #1e293b;
          --muted:        #64748b;
          --border:       #e2e8f0;
          --radius:       0.5rem;
          --shadow:       0 4px 24px rgba(0,0,0,0.10);
        }

        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                       'Helvetica Neue', Arial, sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          display: flex;
          align-items: center;
