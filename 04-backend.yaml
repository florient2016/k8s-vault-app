# ─── ServiceAccount ───────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: itssolutions-prod
  labels:
    app: backend
---
# ─── ConfigMap: server.js application code ───────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-app-code
  namespace: itssolutions-prod
data:
  server.js: |
    'use strict';
    const express    = require('express');
    const helmet     = require('helmet');
    const cors       = require('cors');
    const rateLimit  = require('express-rate-limit');
    const bcrypt     = require('bcrypt');
    const jwt        = require('jsonwebtoken');
    const { Pool }   = require('pg');

    const app  = express();
    const PORT = process.env.PORT || 3000;

    // ── Security middleware ──────────────────────────────────────────
    app.use(helmet());
    app.use(cors({
      origin: process.env.FRONTEND_ORIGIN || '*',
      methods: ['GET', 'POST', 'OPTIONS'],
      allowedHeaders: ['Content-Type', 'Authorization']
    }));
    app.use(express.json());

    // ── Rate limiter on /api/login ───────────────────────────────────
    const loginLimiter = rateLimit({
      windowMs : 15 * 60 * 1000,   // 15 minutes
      max      : 10,
      message  : { error: 'Too many login attempts, please try again later.' }
    });

    // ── PostgreSQL pool (env vars sourced from Vault files) ──────────
    const pool = new Pool({
      host     : process.env.DB_HOST,
      port     : parseInt(process.env.DB_PORT || '5432'),
      database : process.env.DB_NAME,
      user     : process.env.DB_USER,
      password : process.env.DB_PASSWORD,
      ssl      : false
    });

    // ── DB bootstrap: create users table + default admin ────────────
    async function bootstrap() {
      const client = await pool.connect();
      try {
        await client.query(`
          CREATE TABLE IF NOT EXISTS users (
            id         SERIAL PRIMARY KEY,
            username   VARCHAR(64) UNIQUE NOT NULL,
            password   VARCHAR(128) NOT NULL,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
        `);
        const existing = await client.query(
          'SELECT id FROM users WHERE username = $1', ['admin']
        );
        if (existing.rowCount === 0) {
          const hash = await bcrypt.hash('Admin@1234!', 12);
          await client.query(
            'INSERT INTO users (username, password) VALUES ($1, $2)',
            ['admin', hash]
          );
          console.log('Default admin user created.');
        }
      } finally {
        client.release();
      }
    }

    // ── Routes ───────────────────────────────────────────────────────
    app.get('/health', (_req, res) => res.json({ status: 'ok' }));

    app.post('/api/login', loginLimiter, async (req, res) => {
      const { username, password } = req.body || {};
      if (!username || !password) {
        return res.status(400).json({ error: 'username and password are required' });
      }
      try {
        const result = await pool.query(
          'SELECT id, username, password FROM users WHERE username = $1',
          [username]
        );
        if (result.rowCount === 0) {
          return res.status(401).json({ error: 'Invalid credentials' });
        }
        const user = result.rows[0];
        const match = await bcrypt.compare(password, user.password);
        if (!match) {
          return res.status(401).json({ error: 'Invalid credentials' });
        }
        const token = jwt.sign(
          { id: user.id, username: user.username },
          process.env.JWT_SECRET || 'fallback-secret',
          { expiresIn: '8h' }
        );
        return res.json({ token, username: user.username });
      } catch (err) {
        console.error('Login error:', err.message);
        return res.status(500).json({ error: 'Internal server error' });
      }
    });

    app.get('/api/me', (req, res) => {
      const auth = req.headers.authorization || '';
      const token = auth.startsWith('Bearer ') ? auth.slice(7) : null;
      if (!token) return res.status(401).json({ error: 'No token provided' });
      try {
        const decoded = jwt.verify(token, process.env.JWT_SECRET || 'fallback-secret');
        return res.json({ username: decoded.username });
      } catch {
        return res.status(401).json({ error: 'Invalid token' });
      }
    });

    // ── Start ────────────────────────────────────────────────────────
    bootstrap()
      .then(() => {
        app.listen(PORT, '0.0.0.0', () => {
          console.log(`Backend listening on port ${PORT}`);
        });
      })
      .catch(err => {
        console.error('Bootstrap failed:', err.message);
        process.exit(1);
      });

  package.json: |
    {
      "name": "itssolutions-backend",
      "version": "1.0.0",
      "main": "server.js",
      "scripts": { "start": "node server.js" },
      "dependencies": {
        "bcrypt": "^5.1.1",
        "cors": "^2.8.5",
        "express": "^4.18.2",
        "express-rate-limit": "^7.1.5",
        "helmet": "^7.1.0",
        "jsonwebtoken": "^9.0.2",
        "pg": "^8.11.3"
      }
    }

  entrypoint.sh: |
    #!/bin/sh
    set -e
    echo "Waiting for Vault secrets..."
    RETRIES=30
    until [ -f /vault/secrets/db-creds ] && [ -f /vault/secrets/app-config ]; do
      RETRIES=$((RETRIES - 1))
      if [ "$RETRIES" -eq 0 ]; then
        echo "ERROR: Vault secrets not available after timeout."
        exit 1
      fi
      echo "  Vault secrets not yet available, retrying in 3s... ($RETRIES left)"
      sleep 3
    done
    echo "Sourcing Vault secrets..."
    # shellcheck disable=SC1091
    . /vault/secrets/db-creds
    . /vault/secrets/app-config
    echo "Installing npm dependencies..."
    cd /app
    npm install --omit=dev
    echo "Starting Node.js server..."
    exec node server.js
---
# ─── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: itssolutions-prod
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "itssolutions-backend"
        vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/itssolutions/db-creds"
        vault.hashicorp.com/agent-inject-secret-app-config: "secret/data/itssolutions/app-config"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/itssolutions/db-creds" -}}
          export DB_HOST="{{ .Data.data.host }}"
          export DB_PORT="{{ .Data.data.port }}"
          export DB_NAME="{{ .Data.data.database }}"
          export DB_USER="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-template-app-config: |
          {{- with secret "secret/data/itssolutions/app-config" -}}
          export JWT_SECRET="{{ .Data.data.jwt_secret }}"
          {{- end }}
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: node:20-alpine
          command:
            - /bin/sh
            - /app/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: app-code
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: app-code
          configMap:
            name: backend-app-code
            defaultMode: 0755
---
# ─── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: itssolutions-prod
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
