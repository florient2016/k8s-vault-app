# =============================================================================
# 04-backend.yaml — Node.js Express backend
# ALL credentials come exclusively from Vault via sidecar injection
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: itssolutions-prod
  labels:
    app: backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: itssolutions-prod
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "itssolutions-backend"
        vault.hashicorp.com/agent-pre-populate-only: "false"

        vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/itssolutions/db-creds"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/itssolutions/db-creds" -}}
          export DB_HOST="{{ .Data.data.host }}"
          export DB_PORT="{{ .Data.data.port }}"
          export DB_NAME="{{ .Data.data.database }}"
          export DB_USER="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}

        vault.hashicorp.com/agent-inject-secret-app-config: "secret/data/itssolutions/app-config"
        vault.hashicorp.com/agent-inject-template-app-config: |
          {{- with secret "secret/data/itssolutions/app-config" -}}
          export JWT_SECRET="{{ .Data.data.jwt_secret }}"
          {{- end }}

    spec:
      serviceAccountName: backend-sa

      containers:
        - name: backend
          image: komlan2019/itssolutions-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: CORS_ORIGIN
              value: "*"

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: itssolutions-prod
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
