# ─── OpenShift Route: Frontend (TLS Edge) ─────────────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend-route
  namespace: itssolutions-prod
  labels:
    app: frontend
spec:
  host: ""           # Auto-assigned by OpenShift
  to:
    kind: Service
    name: frontend-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
# ─── OpenShift Route: Backend API (TLS Edge) ──────────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: backend-route
  namespace: itssolutions-prod
  labels:
    app: backend
spec:
  host: ""           # Auto-assigned by OpenShift
  path: /api
  to:
    kind: Service
    name: backend-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
